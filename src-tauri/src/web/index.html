<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Network Watch - Web</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: rgba(255,255,255,0.06);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.62);
      --border: rgba(255,255,255,0.12);
      --ok: #38bdf8;
    }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); }
    header { padding: 16px 18px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; gap:12px; align-items:baseline; }
    header .muted { color: var(--muted); font-size: 12px; }
    main { padding: 16px 18px 22px; display:grid; gap:12px; }
    .grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; }
    .grid-3 { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:12px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 12px 12px; }
    .k { color: var(--muted); font-size: 12px; }
    .v { font-size: 18px; font-weight: 700; margin-top: 4px; }
    .s { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.35; }
    pre { margin: 0; overflow:auto; max-height: 52vh; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; color: rgba(255,255,255,0.88); }
    .pill { padding: 3px 8px; border-radius: 999px; border: 1px solid var(--border); background: rgba(0,0,0,0.22); }
    details { border: 1px solid var(--border); border-radius: 14px; background: rgba(0,0,0,0.18); }
    summary { cursor: pointer; padding: 10px 12px; color: var(--muted); font-size: 12px; user-select: none; }
    details[open] summary { border-bottom: 1px solid var(--border); }
    details .details-body { padding: 10px 12px 12px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.10); vertical-align: top; }
    th { color: var(--muted); font-size: 12px; font-weight: 700; }
    td { font-size: 12px; color: rgba(255,255,255,0.88); }
    .right { text-align: right; }
    .muted { color: var(--muted); }
    .badge { display:inline-block; padding:2px 6px; border:1px solid var(--border); border-radius: 999px; background: rgba(0,0,0,0.22); }
    @media (max-width: 980px) { .grid-3 { grid-template-columns: repeat(2, minmax(0,1fr)); } }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } .grid-3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div>
      <div style="font-weight:800">Network Watch</div>
      <div class="muted">
        主机：<span class="pill">__HOST_NAME__</span>
        <span style="margin:0 8px;opacity:.55">·</span>
        IP：<span class="pill">__HOST_IPS__</span>
      </div>
      <div class="muted" style="margin-top:6px">Web 监控 · machine_id: <span class="pill">__MACHINE_ID__</span></div>
    </div>
    <div class="muted">SSE: <span id="sse" class="pill">connecting</span></div>
  </header>
  <main>
    <section class="grid">
      <div class="card"><div class="k">CPU</div><div class="v" id="cpu">—</div><div class="s" id="cpu_s">—</div></div>
      <div class="card"><div class="k">内存</div><div class="v" id="mem">—</div><div class="s" id="mem_s">—</div></div>
      <div class="card"><div class="k">网络（↓/↑）</div><div class="v" id="net">—</div><div class="s" id="net_s">—</div></div>
      <div class="card"><div class="k">活跃网卡</div><div class="v" id="nic">—</div><div class="s mono" id="nic_s">—</div></div>
    </section>

    <section class="grid-3">
      <div class="card"><div class="k">系统盘</div><div class="v" id="disk">—</div><div class="s" id="disk_s">—</div></div>
      <div class="card"><div class="k">进程</div><div class="v" id="proc">—</div><div class="s" id="proc_s">—</div></div>
      <div class="card"><div class="k">运行时长</div><div class="v" id="uptime">—</div><div class="s" id="uptime_s">—</div></div>
    </section>

    <section class="grid">
      <div class="card"><div class="k">Top CPU</div><div class="s mono" id="top_cpu">—</div></div>
      <div class="card"><div class="k">Top 内存</div><div class="s mono" id="top_mem">—</div></div>
    </section>

    <section class="card">
      <div class="k" style="margin-bottom:8px">集群视图（/api/v1/machines）</div>
      <div class="s muted" id="cluster_meta">等待数据…</div>
      <div style="margin-top:10px; overflow:auto">
        <table>
          <thead>
            <tr>
              <th>machine_id</th>
              <th class="right">CPU</th>
              <th class="right">内存</th>
              <th class="right">网络（↓/↑）</th>
              <th>运行时长</th>
              <th class="right">最后上报</th>
            </tr>
          </thead>
          <tbody id="cluster_rows">
            <tr><td colspan="6" class="muted">等待数据…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <details>
      <summary>原始快照（JSON）</summary>
      <div class="details-body">
        <pre><code id="raw">等待数据…</code></pre>
      </div>
    </details>
  </main>
  <script>
    function fmtPct(x) {
      if (typeof x !== "number") return "—";
      return x.toFixed(0) + "%";
    }
    function fmtBytes(x) {
      if (typeof x !== "number") return "—";
      const units = ["B","KB","MB","GB","TB"];
      let v = x, i = 0;
      while (v >= 1024 && i < units.length-1) { v/=1024; i++; }
      return v.toFixed(i === 0 ? 0 : 1) + " " + units[i];
    }
    function fmtRate(x) {
      return fmtBytes(x) + "/s";
    }
    function fmtUptime(seconds) {
      if (typeof seconds !== "number") return "—";
      const s = Math.max(0, Math.floor(seconds));
      const d = Math.floor(s / 86400);
      const h = Math.floor((s % 86400) / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (d > 0) return d + "天 " + h + "小时";
      if (h > 0) return h + "小时 " + m + "分钟";
      return m + "分钟";
    }
    function fmtTop(list, kind) {
      if (!Array.isArray(list) || list.length === 0) return "—";
      return list.slice(0, 5).map((p, idx) => {
        const name = (p && p.name) ? p.name : "—";
        const pid = (p && typeof p.pid === "number") ? p.pid : null;
        let metric = "—";
        if (kind === "cpu" && p && typeof p.cpu_usage === "number") metric = p.cpu_usage.toFixed(0) + "%";
        if (kind === "mem" && p && typeof p.memory_used === "number") metric = fmtBytes(p.memory_used);
        return (idx + 1) + ". " + name + (pid !== null ? (" (pid " + pid + ")") : "") + " — " + metric;
      }).join("\n");
    }
    function apply(s) {
      const now = Date.now();
      const ts = (s && typeof s.timestamp === "number") ? s.timestamp : null;
      const age = (ts ? Math.max(0, Math.round((now - ts) / 1000)) : null);

      document.getElementById("cpu").textContent = fmtPct(s.cpu_usage);
      document.getElementById("cpu_s").textContent = (age === null ? "—" : ("更新 " + age + " 秒前"));

      if (s.memory_total > 0) {
        const used = fmtBytes(s.memory_used);
        const total = fmtBytes(s.memory_total);
        const pct = (s.memory_used / s.memory_total) * 100;
        document.getElementById("mem").textContent = used + " / " + total + " (" + pct.toFixed(0) + "%)";
        document.getElementById("mem_s").textContent = "已用 " + used;
      } else {
        document.getElementById("mem").textContent = "—";
        document.getElementById("mem_s").textContent = "—";
      }

      document.getElementById("net").textContent = "↓ " + fmtRate(s.network_download) + " / ↑ " + fmtRate(s.network_upload);
      document.getElementById("net_s").textContent = "接口数 " + (Array.isArray(s.nics) ? s.nics.length : 0);

      document.getElementById("nic").textContent = s.active_nic_id ?? "—";
      const nic = (Array.isArray(s.nics) && s.active_nic_id) ? s.nics.find(x => x && x.id === s.active_nic_id) : null;
      if (nic) {
        document.getElementById("nic_s").textContent = "↓ " + fmtRate(nic.received) + " / ↑ " + fmtRate(nic.transmitted);
      } else {
        document.getElementById("nic_s").textContent = "—";
      }

      if (s.system_disk && typeof s.system_disk.total_bytes === "number" && typeof s.system_disk.available_bytes === "number") {
        const total = s.system_disk.total_bytes;
        const avail = s.system_disk.available_bytes;
        const used = Math.max(0, total - avail);
        const pct = total > 0 ? (used / total) * 100 : 0;
        document.getElementById("disk").textContent = pct.toFixed(0) + "%";
        document.getElementById("disk_s").textContent = fmtBytes(avail) + " 可用 / " + fmtBytes(total);
      } else {
        document.getElementById("disk").textContent = "—";
        document.getElementById("disk_s").textContent = "—";
      }

      document.getElementById("proc").textContent = (typeof s.process_count === "number") ? (String(s.process_count)) : "—";
      document.getElementById("proc_s").textContent = "Top 进程来自采样";

      document.getElementById("uptime").textContent = fmtUptime(s.uptime_seconds);
      document.getElementById("uptime_s").textContent = (typeof s.uptime_seconds === "number") ? (s.uptime_seconds + " 秒") : "—";

      document.getElementById("top_cpu").textContent = fmtTop(s.top_processes_cpu, "cpu");
      document.getElementById("top_mem").textContent = fmtTop(s.top_processes_memory, "mem");

      document.getElementById("raw").textContent = JSON.stringify(s, null, 2);
    }

    function safeNum(x) { return (typeof x === "number" && Number.isFinite(x)) ? x : null; }
    function getSnapshotFromMachineValue(v) {
      if (v && typeof v === "object" && v.snapshot) return v.snapshot;
      return v;
    }
    function getReceivedAtMs(v) {
      if (v && typeof v === "object" && typeof v.received_at_ms === "number") return v.received_at_ms;
      return null;
    }
    function fmtAgeMs(ms) {
      if (typeof ms !== "number") return "—";
      const s = Math.max(0, Math.round(ms / 1000));
      if (s < 60) return s + "s";
      const m = Math.round(s / 60);
      return m + "m";
    }
    function esc(s) {
      return String(s).replace(/[&<>\"]/g, (c) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;" }[c]));
    }
    async function refreshCluster() {
      const meta = document.getElementById("cluster_meta");
      const tbody = document.getElementById("cluster_rows");
      try {
        const res = await fetch("/api/v1/machines");
        const data = await res.json();
        const entries = Object.entries(data || {});
        meta.textContent = "在线节点 " + entries.length + " · 每 2s 刷新";
        if (!entries.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="muted">暂无 agent 上报</td></tr>';
          return;
        }
        const now = Date.now();
        const rows = entries.map(([id, val]) => {
          const receivedAt = getReceivedAtMs(val);
          const snap = getSnapshotFromMachineValue(val) || {};
          const cpu = safeNum(snap.cpu_usage);
          const memUsed = safeNum(snap.memory_used);
          const memTotal = safeNum(snap.memory_total);
          const down = safeNum(snap.network_download);
          const up = safeNum(snap.network_upload);
          const uptime = safeNum(snap.uptime_seconds);
          const age = receivedAt ? (now - receivedAt) : null;
          return {
            id,
            receivedAt: receivedAt || 0,
            html: '<tr>' +
              '<td><span class="badge mono">' + esc(id) + '</span></td>' +
              '<td class="right">' + (cpu === null ? "—" : cpu.toFixed(0) + "%") + '</td>' +
              '<td class="right">' + ((memUsed !== null && memTotal) ? (fmtBytes(memUsed) + " / " + fmtBytes(memTotal)) : "—") + '</td>' +
              '<td class="right">' + ((down !== null && up !== null) ? ("↓ " + fmtRate(down) + " / ↑ " + fmtRate(up)) : "—") + '</td>' +
              '<td>' + (uptime === null ? "—" : fmtUptime(uptime)) + '</td>' +
              '<td class="right">' + (age === null ? "—" : fmtAgeMs(age)) + '</td>' +
            '</tr>',
          };
        }).sort((a, b) => b.receivedAt - a.receivedAt);
        tbody.innerHTML = rows.map(r => r.html).join("");
      } catch (e) {
        meta.textContent = "拉取失败（/api/v1/machines）";
      }
    }
    async function boot() {
      try {
        const res = await fetch("/api/v1/snapshot");
        const env = await res.json();
        if (env && env.snapshot) apply(env.snapshot);
      } catch {}
      const badge = document.getElementById("sse");
      const es = new EventSource("/api/v1/stream");
      es.onopen = () => { badge.textContent = "connected"; };
      es.onerror = () => { badge.textContent = "error"; };
      es.onmessage = (ev) => {
        try {
          const env = JSON.parse(ev.data);
          if (env && env.snapshot) apply(env.snapshot);
        } catch {}
      };
      refreshCluster();
      setInterval(refreshCluster, 2000);
    }
    boot();
  </script>
</body>
</html>
