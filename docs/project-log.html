<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Network Watch · 项目日志</title>
    <style>
      :root {
        --bg0: #070a12;
        --bg1: #0b1220;
        --panel: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.12);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.66);
        --shadow: rgba(0, 0, 0, 0.35);
        --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans";
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg0: #f6f8ff;
          --bg1: #eef3ff;
          --panel: rgba(0, 0, 0, 0.04);
          --border: rgba(0, 0, 0, 0.08);
          --text: rgba(18, 24, 38, 0.92);
          --muted: rgba(18, 24, 38, 0.66);
          --shadow: rgba(15, 23, 42, 0.12);
        }
      }
      body {
        margin: 0;
        font-family: var(--sans);
        color: var(--text);
        background: linear-gradient(180deg, var(--bg0), var(--bg1));
      }
      .container {
        width: min(1000px, calc(100% - 32px));
        margin: 0 auto;
        padding: 22px 0 40px;
      }
      a {
        color: inherit;
      }
      header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
        margin-bottom: 14px;
      }
      .muted {
        color: var(--muted);
        font-size: 12px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 16px 36px var(--shadow);
        padding: 14px 14px;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: var(--mono);
        font-size: 12px;
        color: rgba(255, 255, 255, 0.9);
      }
      @media (prefers-color-scheme: light) {
        pre {
          color: rgba(18, 24, 38, 0.9);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div>
          <strong>项目日志</strong>
          <div class="muted">从仓库 `docs/project-log.md` 自动读取并展示</div>
        </div>
        <div class="muted">
          <a href="./index.html">返回首页</a>
          <span style="opacity:0.6"> · </span>
          <a href="https://github.com/touchfish1/network-watch/blob/main/docs/project-log.md" target="_blank" rel="noreferrer"
            >在 GitHub 查看</a
          >
        </div>
      </header>
      <div class="card">
        <pre id="content">加载中…</pre>
      </div>
    </div>
    <script>
      async function boot() {
        const el = document.getElementById("content");
        try {
          const res = await fetch("./project-log.md", { cache: "no-store" });
          if (!res.ok) throw new Error("fetch failed");
          const text = await res.text();
          el.textContent = text;
        } catch {
          el.textContent =
            "加载失败：请直接访问 GitHub 上的 project-log.md\\n\\nhttps://github.com/touchfish1/network-watch/blob/main/docs/project-log.md";
        }
      }
      boot();
    </script>
  </body>
</html>
