name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          releaseName: ${{ github.event_name == 'workflow_dispatch' && inputs.release_name != '' && inputs.release_name || format('Network Watch {0}', github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name) }}
          releaseBody: "Automated build from GitHub Actions."
          releaseDraft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
