name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.2.0"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_name != '' && inputs.release_name || format('Network Watch {0}', github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name) }}
          body: "Automated multi-platform build from GitHub Actions."
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          target_commitish: ${{ github.sha }}

  publish-tauri:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --features agent
          - platform: ubuntu-22.04
            args: --features agent
          - platform: macos-latest
            args: --features agent
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Build and upload release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          releaseName: ${{ github.event_name == 'workflow_dispatch' && inputs.release_name != '' && inputs.release_name || format('Network Watch {0}', github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name) }}
          releaseBody: "Automated multi-platform build from GitHub Actions."
          releaseDraft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          args: ${{ matrix.args }}

      - name: Create zipped installers (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null

          $installers = @()
          $installers += Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -File -ErrorAction SilentlyContinue
          $installers += Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -File -ErrorAction SilentlyContinue

          foreach ($installer in $installers) {
            $zipName = Join-Path "dist-release" ($installer.Name + ".zip")
            if (Test-Path $zipName) { Remove-Item -Force $zipName }
            Compress-Archive -Path $installer.FullName -DestinationPath $zipName
            Write-Host "Created: $zipName"
          }

      - name: Create zipped installers (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p dist-release

          installers=(
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/pkg/*.pkg
          )

          for installer in "${installers[@]}"; do
            base_name="$(basename "$installer")"
            zip_name="dist-release/${base_name}.zip"
            zip -j "$zip_name" "$installer"
            echo "Created: $zip_name"
          done

      - name: Upload zipped installers to GitHub Release
        if: matrix.platform == 'windows-latest' || matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          files: |
            dist-release/*.zip

  # 独立 job：仅构建 Linux headless agent 并上传 Release，不使用 Node / 不与桌面矩阵共用 runner。
  # 使用 ubuntu-22.04（较旧 glibc）而非 24.04，避免产物要求 GLIBC_2.38+ 导致在旧版无 GUI Linux 上无法运行。
  publish-agent:
    name: Linux agent (standalone)
    needs: prepare-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: agent

      - name: Build network-watch-agent (glibc, Ubuntu 22.04)
        run: |
          cd src-tauri
          cargo build --release --no-default-features --features agent --bin network-watch-agent

      - name: Build network-watch-agent (musl static)
        env:
          CC_x86_64_unknown_linux_musl: x86_64-linux-musl-gcc
        run: |
          cd src-tauri
          cargo build --release --target x86_64-unknown-linux-musl --no-default-features --features agent --bin network-watch-agent

      - name: Stage agent artifacts for release
        run: |
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          PKG_DIR_NAME="network-watch-agent-${VERSION}"
          PKG_FILE_NAME="${PKG_DIR_NAME}.tar.gz"

          mkdir -p dist-agent
          mkdir -p "dist-agent/${PKG_DIR_NAME}"
          cp src-tauri/target/release/network-watch-agent "dist-agent/${PKG_DIR_NAME}/network-watch-agent"
          cp src-tauri/target/x86_64-unknown-linux-musl/release/network-watch-agent "dist-agent/${PKG_DIR_NAME}/network-watch-agent-musl"
          chmod +x "dist-agent/${PKG_DIR_NAME}/network-watch-agent" "dist-agent/${PKG_DIR_NAME}/network-watch-agent-musl"
          tar -C dist-agent -czf "dist-agent/${PKG_FILE_NAME}" "${PKG_DIR_NAME}"

      - name: Upload agent package to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          files: |
            dist-agent/network-watch-agent-*.tar.gz
