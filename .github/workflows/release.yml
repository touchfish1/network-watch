name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            generator: Ninja
          - os: macos-14
            label: macos-arm64
            generator: Ninja
          - os: windows-latest
            label: windows-x86_64
            generator: "Visual Studio 17 2022"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config libgtk-3-dev libayatana-appindicator3-dev libnotify-dev

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build -G "${{ matrix.generator }}" -A x64 -DNETWORK_WATCH_RELEASE_VERSION="${env:RELEASE_TAG}" -DNETWORK_WATCH_BUILD_TESTS=ON

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build -G "${{ matrix.generator }}" -DNETWORK_WATCH_RELEASE_VERSION="${RELEASE_TAG}" -DNETWORK_WATCH_BUILD_TESTS=ON

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --build build --config Release

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake --build build --config Release

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ctest --test-dir build -C Release --output-on-failure

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: |
          ctest --test-dir build --output-on-failure

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cpack --config build/CPackConfig.cmake -B dist -C Release --verbose

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cpack --config build/CPackConfig.cmake -B dist -C Release --verbose

      - name: Collect packaged artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          find dist -maxdepth 1 -type f -exec cp {} release-files/ \;
          ls -la release-files

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: release-files/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release-assets -maxdepth 1 -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release asset files found in release-assets/"
            exit 1
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists, uploading fresh assets."
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
